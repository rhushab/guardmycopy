name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Files not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build binary
        run: go build ./cmd/guardmycopy
